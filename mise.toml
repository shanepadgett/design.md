min_version = { soft = "2026.5.6" }

[tools]
node = "24.15.0"

[tasks."format:fix"]
description = "Format supported files in place"
quiet = true
run = "npm --silent run format:fix"

[tasks."format:check"]
description = "Report remaining formatting differences"
quiet = true
run = "npm --silent run format:check"

[tasks.format]
description = "Fix formatting first, then report remaining formatting issues"
quiet = true
run = [{ task = "format:fix" }, { task = "format:check" }]

[tasks."lint:fix"]
description = "Apply safe code lint fixes"
quiet = true
run = "npm --silent run lint:fix"

[tasks."lint:check"]
description = "Report remaining code lint issues"
quiet = true
run = "npm --silent run lint:check"

[tasks."markdownlint:fix"]
description = "Apply safe Markdown lint fixes"
quiet = true
run = "npm --silent run markdownlint:fix"

[tasks."markdownlint:check"]
description = "Report remaining Markdown lint issues"
quiet = true
run = "npm --silent run markdownlint:check"

[tasks.lint]
description = "Fix lint issues first, then report remaining lint issues"
quiet = true
run = [
  { task = "lint:fix" },
  { task = "lint:check" },
  { task = "markdownlint:fix" },
  { task = "markdownlint:check" },
]

[tasks.typecheck]
description = "Run TypeScript without emitting files"
quiet = true
run = "npm --silent run typecheck"

[tasks.build]
description = "Build the CLI and library"
quiet = true
run = "npm --silent run build"

[tasks.test]
description = "Run test suite"
quiet = true
run = "npm --silent run test"

[tasks.check]
description = "Sequentially format, lint, and typecheck"
quiet = true
run = [{ task = "format" }, { task = "lint" }, { task = "typecheck" }]
